# Principe — self-hosted OSS stack.
# One command boots Postgres + the Statistician + the web app.
#
#   docker compose up -d
#   open http://localhost:3000
#
# First boot is slow (image builds, Prisma migrations run, PyMC warms up).
# Subsequent boots are seconds.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: principe
      POSTGRES_USER: principe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-principe}
    volumes:
      - principe_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U principe -d principe"]
      interval: 5s
      timeout: 3s
      retries: 10
      # Grace window for first-boot initdb on a fresh volume. Without it,
      # initdb's "not ready yet" checks burn the retry budget and db can
      # flip to "unhealthy" under heavy I/O (right after image builds),
      # which aborts web's `depends_on: service_healthy` and breaks the
      # one-command boot. Failures during start_period don't count. 60s
      # covers qemu-backed Docker on macOS, where initdb runs slower.
      # (bin/start.sh additionally stages db before web for determinism.)
      start_period: 60s

  statistician:
    build:
      context: .
      dockerfile: services/statistician/Dockerfile
    restart: unless-stopped
    environment:
      STATISTICIAN_SHARED_SECRET: ${STATISTICIAN_SHARED_SECRET:?STATISTICIAN_SHARED_SECRET must be set — see bin/start.sh}
      STATISTICIAN_CALIBRATION_PATH: /calibration/datasets/panorays-2026-ciso.json
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/principe/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://principe:${POSTGRES_PASSWORD:-principe}@db:5432/principe
      STATISTICIAN_SERVICE_URL: http://statistician:8000
      STATISTICIAN_SHARED_SECRET: ${STATISTICIAN_SHARED_SECRET:?}
      PRINCIPE_ENCRYPTION_KEY: ${PRINCIPE_ENCRYPTION_KEY:?PRINCIPE_ENCRYPTION_KEY must be set — see bin/start.sh}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost:3000}
      # Updates mode. Default is LOCAL — empty string means no remote check,
      # nothing pings home (matches the README's privacy promise). Opt in to
      # signed pull-updates by setting PRINCIPE_UPDATES_URL in .env.runtime
      # to a publisher endpoint, or to the literal "disabled" to hide the
      # updates UI entirely. (Do not point this at a live endpoint until a
      # real signing public key ships — the default key is a placeholder.)
      PRINCIPE_UPDATES_URL: ${PRINCIPE_UPDATES_URL:-}
      PRINCIPE_UPDATES_PUBLIC_KEY: ${PRINCIPE_UPDATES_PUBLIC_KEY:-}
    healthcheck:
      # Hits the unauthenticated /api/health probe (DB reachability). The web
      # image bundles curl. start_period covers the first-boot build/migrate.
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      statistician:
        condition: service_healthy

volumes:
  principe_db:
